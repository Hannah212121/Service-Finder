<!DOCTYPE html>
<html>
<head>
  <title>Dorset Service Finder</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, label { margin: 5px; }
    .service { margin-bottom: 20px; padding: 10px; border: 1px solid #ccc; }
  </style>
</head>
<body>

<h1>Dorset Service Finder</h1>

<p id="status">Loading data...</p>

<!-- 🔍 Filters -->
<input type="text" id="search" placeholder="Search services...">

<label>
  <input type="checkbox" id="freeOnly">
  Free only
</label>

<label>
  Age:
  <input type="number" id="ageInput" placeholder="Enter age">
</label>

<button onclick="applyFilters()">Apply Filters</button>

<hr>

<div id="results"></div>

<script>
let allServices = [];

async function fetchAllServices() {
  const baseUrl = "https://dorset.localplacedirectory.org.uk/aggregator/services";
  const totalPages = 204;
  const pageSize = 10;

  const status = document.getElementById("status");

  for (let page = 1; page <= totalPages; page++) {
    try {
      const res = await fetch(`${baseUrl}?page=${page}&size=${pageSize}`);
      const data = await res.json();

      allServices = allServices.concat(data.contents);

      status.textContent = `Loading page ${page} of ${totalPages}...`;

    } catch (err) {
      console.error("Error loading page", page, err);
    }
  }

  status.textContent = `Loaded ${allServices.length} services ✅`;
  display(allServices);
}

function display(services) {
  const container = document.getElementById("results");
  container.innerHTML = "";

  services.forEach(s => {
    const div = document.createElement("div");
    div.className = "service";

    div.innerHTML = `
      <h3>${s.name}</h3>
      <p><strong>Organisation:</strong> ${s.organization?.name || "N/A"}</p>
      <p>${s.description || ""}</p>
      <p>
        <a href="${s.url}" target="_blank">Visit website</a>
      </p>
    `;

    container.appendChild(div);
  });
}

function applyFilters() {
  let filtered = [...allServices];

  const search = document.getElementById("search").value.toLowerCase();
  const freeOnly = document.getElementById("freeOnly").checked;
  const age = parseInt(document.getElementById("ageInput").value);

  // 🔍 Keyword filter
  if (search) {
    filtered = filtered.filter(s =>
      (s.name && s.name.toLowerCase().includes(search)) ||
      (s.description && s.description.toLowerCase().includes(search)) ||
      (s.organization?.name && s.organization.name.toLowerCase().includes(search))
    );
  }

  // 💰 Free filter
  if (freeOnly) {
    filtered = filtered.filter(s =>
      s.cost_options?.some(c => c.amount === 0)
    );
  }

  // 🎂 Age filter
  if (!isNaN(age)) {
    filtered = filtered.filter(s =>
      (s.minimum_age === null || age >= s.minimum_age) &&
      (s.maximum_age === null || age <= s.maximum_age)
    );
  }

  display(filtered);
}

// Load everything on page start
fetchAllServices();
</script>

</body>
</html>
