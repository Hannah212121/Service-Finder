<!DOCTYPE html>
<html>
<head>
  <title>Service Finder</title>
</head>
<body>

<h1>Dorset Service Finder</h1>

<p id="status">Loading...</p>

<input type="text" id="search" placeholder="Search services...">

<label>
  <input type="checkbox" id="freeOnly"> Free only
</label>

<label>
  Age:
  <input type="number" id="ageInput">
</label>

<button onclick="applyFilters()">Apply Filters</button>

<div id="results"></div>
<script>
let allServices = [];

async function fetchAllServices() {
  const url = "https://dorset.localplacedirectory.org.uk/aggregator/services?page=1&size=10";

  const status = document.getElementById("status");

  try {
    const res = await fetch(url);
    const data = await res.json();

    allServices = data.contents;

    status.textContent = `Loaded ${allServices.length} services ✅`;

    display(allServices);

  } catch (err) {
    console.error(err);
    status.textContent = "Error loading data ❌";
  }
}

function display(services) {
  const container = document.getElementById("results");
  container.innerHTML = "";

  services.forEach(s => {
    const div = document.createElement("div");
    div.className = "service";

    div.innerHTML = `
      <h3>${s.name}</h3>
      <p><strong>Organisation:</strong> ${s.organization?.name || "N/A"}</p>
      <p>${s.description || ""}</p>
      <p><a href="${s.url}" target="_blank">Visit website</a></p>
    `;

    container.appendChild(div);
  });
}

function applyFilters() {
  let filtered = [...allServices];

  const search = document.getElementById("search").value.toLowerCase();
  const freeOnly = document.getElementById("freeOnly").checked;
  const age = parseInt(document.getElementById("ageInput").value);

  if (search) {
    filtered = filtered.filter(s =>
      (s.name && s.name.toLowerCase().includes(search)) ||
      (s.description && s.description.toLowerCase().includes(search)) ||
      (s.organization?.name && s.organization.name.toLowerCase().includes(search))
    );
  }

  if (freeOnly) {
    filtered = filtered.filter(s =>
      s.cost_options?.some(c => c.amount === 0)
    );
  }

  if (!isNaN(age)) {
    filtered = filtered.filter(s =>
      (s.minimum_age === null || age >= s.minimum_age) &&
      (s.maximum_age === null || age <= s.maximum_age)
    );
  }

  display(filtered);
}

fetchAllServices();
</script>

  </body>
</html>
