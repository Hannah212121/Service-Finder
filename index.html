<script>
let allServices = [];

async function fetchAllServices() {
  const baseUrl = "https://dorset.localplacedirectory.org.uk/aggregator/services";
  const totalPages = 204; // from your API response
  const pageSize = 10;

  const status = document.createElement("p");
  status.textContent = "Loading data...";
  document.body.appendChild(status);

  for (let page = 1; page <= totalPages; page++) {
    try {
      const res = await fetch(`${baseUrl}?page=${page}&size=${pageSize}`);
      const data = await res.json();

      allServices = allServices.concat(data.contents);

      status.textContent = `Loading page ${page} of ${totalPages}...`;

    } catch (err) {
      console.error("Error loading page", page, err);
    }
  }

  status.textContent = `Loaded ${allServices.length} services ✅`;

  display(allServices);
}

function display(services) {
  const list = document.getElementById("results");
  list.innerHTML = "";

  services.forEach(s => {
    const li = document.createElement("li");
    li.textContent = s.name;
    list.appendChild(li);
  });
}

// Start loading everything
fetchAllServices();
</script>
