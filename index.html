<script>
let allServices = [];

async function fetchAllServices() {
  const baseUrl = "https://dorset.localplacedirectory.org.uk/aggregator/services";
  const totalPages = 10; // ✅ ONLY LOAD FIRST 10 PAGES
  const pageSize = 10;

  const status = document.getElementById("status");

  for (let page = 1; page <= totalPages; page++) {
    try {
      const res = await fetch(`${baseUrl}?page=${page}&size=${pageSize}`);
      const data = await res.json();

      allServices = allServices.concat(data.contents);

      status.textContent = `Loading page ${page} of ${totalPages}...`;

    } catch (err) {
      console.error("Error loading page", page, err);
    }
  }

  status.textContent = `Loaded ${allServices.length} services (first ${totalPages} pages) ✅`;
  display(allServices);
}

function display(services) {
  const container = document.getElementById("results");
  container.innerHTML = "";

  services.forEach(s => {
    const div = document.createElement("div");
    div.className = "service";

    div.innerHTML = `
      <h3>${s.name}</h3>
      <p><strong>Organisation:</strong> ${s.organization?.name || "N/A"}</p>
      <p>${s.description || ""}</p>
      <p>
        <a href="${s.url}" target="_blank">Visit website</a>
      </p>
    `;

    container.appendChild(div);
  });
}

function applyFilters() {
  let filtered = [...allServices];

  const search = document.getElementById("search").value.toLowerCase();
  const freeOnly = document.getElementById("freeOnly").checked;
  const age = parseInt(document.getElementById("ageInput").value);

  if (search) {
    filtered = filtered.filter(s =>
      (s.name && s.name.toLowerCase().includes(search)) ||
      (s.description && s.description.toLowerCase().includes(search)) ||
      (s.organization?.name && s.organization.name.toLowerCase().includes(search))
    );
  }

  if (freeOnly) {
    filtered = filtered.filter(s =>
      s.cost_options?.some(c => c.amount === 0)
    );
  }

  if (!isNaN(age)) {
    filtered = filtered.filter(s =>
      (s.minimum_age === null || age >= s.minimum_age) &&
      (s.maximum_age === null || age <= s.maximum_age)
    );
  }

  display(filtered);
}

fetchAllServices();
</script>
